<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart Total Calculator</title>

  <!-- Attribution: Layout and form styling ideas inspired by MDN HTML forms docs (https://developer.mozilla.org/) -->
  <link rel="stylesheet" href="shopping-cart.css">
</head>
<body>
  <main class="page">
    <h1>Shopping Cart Total Calculator</h1>
    <p>Enter item names, quantities, and prices. Then click <strong>Calculate Total</strong>.</p>

    <form id="cartForm" class="cart-form">
      <div class="grid header-row" aria-hidden="true">
        <span>Item Name</span>
        <span>Quantity</span>
        <span>Price ($)</span>
      </div>

      <div class="grid item-row">
        <input type="text" id="itemName1" name="itemName1" placeholder="Item 1 name">
        <input type="number" id="quantity1" name="quantity1" min="0" step="1" value="0">
        <input type="number" id="price1" name="price1" min="0" step="0.01" value="0">
      </div>

      <div class="grid item-row">
        <input type="text" id="itemName2" name="itemName2" placeholder="Item 2 name">
        <input type="number" id="quantity2" name="quantity2" min="0" step="1" value="0">
        <input type="number" id="price2" name="price2" min="0" step="0.01" value="0">
      </div>

      <div class="grid item-row">
        <input type="text" id="itemName3" name="itemName3" placeholder="Item 3 name">
        <input type="number" id="quantity3" name="quantity3" min="0" step="1" value="0">
        <input type="number" id="price3" name="price3" min="0" step="0.01" value="0">
      </div>

      <div class="grid item-row">
        <input type="text" id="itemName4" name="itemName4" placeholder="Item 4 name">
        <input type="number" id="quantity4" name="quantity4" min="0" step="1" value="0">
        <input type="number" id="price4" name="price4" min="0" step="0.01" value="0">
      </div>

      <button type="button" id="calculateBtn">Calculate Total</button>
    </form>

    <div id="result" class="result" aria-live="polite">Total Cost: $0.00</div>
  </main>

  <!-- Attribution: Event handling and number parsing patterns inspired by MDN JavaScript docs (https://developer.mozilla.org/) -->
  <script src="shopping-cart.js"></script>
</body>
</html>
